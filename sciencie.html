<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>НАУЧНЫЙ ОТДЕЛ · О.И.Д.Л.</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #020305; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Courier New', 'VT323', monospace; position: relative; overflow-x: hidden;
    }

    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.5) 0px, rgba(20,0,40,0.2) 3px, rgba(100,100,255,0.02) 4px, transparent 5px);
      pointer-events: none; z-index: 100; animation: scan 10s linear infinite; opacity: 0.7;
    }

    body.desktop { padding: 16px; }
    body.mobile { padding: 0; }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 20px; } }

    .terminal {
      background-color: #0a0b0e; display: flex; flex-direction: column; position: relative; z-index: 20;
    }
    body.desktop .terminal {
      max-width: 1000px; width: 100%; border: 4px solid #440088;
      box-shadow: 0 0 0 2px #220044, 0 0 20px #8844ff inset, 0 0 30px rgba(136,68,255,0.3);
      border-radius: 12px 12px 20px 20px; padding: 0 0 6px 0;
    }
    body.mobile .terminal { width: 100%; min-height: 100vh; border: none; }

    .terminal-header {
      background: #050010; border-bottom: 2px solid #440088;
      display: flex; align-items: center; justify-content: space-between; padding: 12px 18px;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .atom {
      width: 44px; height: 44px; position: relative;
      border: 3px solid #8844ff; border-radius: 50%;
      box-shadow: 0 0 20px #8844ff;
    }
    .atom::after {
      content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 12px; height: 12px; background: #aa66ff; border-radius: 50%;
      box-shadow: 0 0 10px #aa66ff;
    }
    body.mobile .atom { width: 34px; height: 34px; }
    body.mobile .atom::after { width: 9px; height: 9px; }

    .header-title { font-weight: bold; letter-spacing: 5px; color: #8844ff; text-shadow: 0 0 10px #8844ff; font-family: 'VT323', monospace; }
    body.desktop .header-title { font-size: 1.5rem; }
    body.mobile .header-title { font-size: 1.2rem; }

    .back-btn {
      background: #0a0020; border: 2px solid #8844ff; color: #8844ff;
      font-family: 'Courier New', monospace; font-size: 0.85rem; padding: 6px 14px;
      cursor: pointer; text-decoration: none; text-transform: uppercase;
    }

    .screen {
      color: #aa88ff; text-shadow: 0 0 6px rgba(136,68,255,0.3);
      background: #020010; font-size: 0.95rem; line-height: 1.4;
      padding: 20px 18px; flex: 1; overflow-y: auto;
    }

    .science-title { text-align: center; color: #8844ff; font-size: 1.3rem; font-family: 'VT323', monospace; letter-spacing: 3px; margin-bottom: 20px; }

    .specimen-card {
      border: 2px solid #440088; background: #050010; padding: 14px; margin: 10px 0;
      cursor: pointer;
    }
    .specimen-card:hover { border-color: #8844ff; }
    .specimen-name { color: #aa66ff; font-size: 1.2rem; font-family: 'VT323', monospace; }
    .specimen-type { color: #6644aa; font-size: 0.8rem; }

    .form-section { margin-bottom: 14px; }
    .form-label { color: #8844ff; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; display: block; }
    .form-input, .form-textarea { width: 100%; background: #050010; border: 2px solid #440088; color: #aa88ff; padding: 10px 12px; font-family: 'Courier New', monospace; font-size: 0.9rem; outline: none; }
    .form-textarea { resize: vertical; min-height: 60px; }

    .btn-save { background: #0a0020; border: 2px solid #44ff44; color: #44ff44; padding: 12px 20px; font-family: inherit; font-size: 1rem; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 8px; }
    .btn-new { background: #0a0020; border: 2px solid #8844ff; color: #8844ff; padding: 12px 20px; font-family: inherit; font-size: 1rem; text-transform: uppercase; cursor: pointer; width: 100%; margin-bottom: 12px; }

    .terminal-footer { padding: 10px 14px; display: flex; justify-content: space-between; color: #330066; background: #030008; border-top: 1px solid #220044; font-size: 0.7rem; text-transform: uppercase; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

<div class="terminal">
  <div class="terminal-header">
    <div class="header-left">
      <div class="atom"></div>
      <div class="header-title">НАУЧНЫЙ ОТДЕЛ</div>
    </div>
    <a href="index.html" class="back-btn">◄ ТЕРМИНАЛ</a>
  </div>

  <div class="screen">
    <div class="science-title">◆ БАЗА ОБРАЗЦОВ И МУТАЦИЙ ◆</div>

    <button class="btn-new" id="newSpecimenBtn">■ НОВЫЙ ОБРАЗЕЦ</button>

    <div id="specimenList"></div>
    <div id="formContainer" style="display:none;"></div>
  </div>

  <div class="terminal-footer"><span>НАУЧНЫЙ ОТДЕЛ v.1.0</span><span>О.И.Д.Л.</span></div>
</div>

<script>
  const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth < 768;
  document.body.className = isMobile ? 'mobile' : 'desktop';

  firebase.initializeApp({
    apiKey: "AIzaSyCAfEXo57oLviomSjUm4dC23-uHTS11HHU",
    authDomain: "oidl-rule.firebaseapp.com",
    databaseURL: "https://oidl-rule-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "oidl-rule",
    storageBucket: "oidl-rule.firebasestorage.app",
    messagingSenderId: "46225230611",
    appId: "1:46225230611:web:f2017e047a52925420e8e6"
  });
  const db = firebase.database();

  let specimens = [];
  let editingIndex = -1;

  function loadData() {
    db.ref('specimens').on('value', sn => {
      specimens = sn.exists() ? sn.val() : [];
      renderSpecimenList();
    });
  }

  function renderSpecimenList() {
    const list = document.getElementById('specimenList');
    if (!list) return;
    if (!specimens.length) {
      list.innerHTML = '<div style="color:#440066;text-align:center;padding:20px;">БАЗА ОБРАЗЦОВ ПУСТА</div>';
      return;
    }
    list.innerHTML = '';
    specimens.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'specimen-card';
      card.innerHTML = `<div class="specimen-name">◆ ${s.name}</div><div class="specimen-type">${s.type||'НЕИЗВЕСТНЫЙ ТИП'}</div>`;
      card.addEventListener('click', () => openForm(i));
      list.appendChild(card);
    });
  }

  function openForm(index) {
    editingIndex = index;
    const record = index >= 0 ? specimens[index] : {};
    const container = document.getElementById('formContainer');
    container.style.display = 'block';
    container.innerHTML = `
      <div class="form-section"><span class="form-label">НАЗВАНИЕ:</span><input type="text" class="form-input" id="sfName" value="${record.name||''}"></div>
      <div class="form-section"><span class="form-label">ТИП (мутация, робот, растение...):</span><input type="text" class="form-input" id="sfType" value="${record.type||''}"></div>
      <div class="form-section"><span class="form-label">МЕСТО ОБНАРУЖЕНИЯ:</span><input type="text" class="form-input" id="sfLocation" value="${record.location||''}"></div>
      <div class="form-section"><span class="form-label">УРОВЕНЬ ОПАСНОСТИ (1-10):</span><input type="text" class="form-input" id="sfDanger" value="${record.danger||''}"></div>
      <div class="form-section"><span class="form-label">СЛАБОСТИ:</span><textarea class="form-textarea" id="sfWeakness">${record.weakness||''}</textarea></div>
      <div class="form-section"><span class="form-label">ОПИСАНИЕ:</span><textarea class="form-textarea" id="sfDescription">${record.description||''}</textarea></div>
      <div class="form-section"><span class="form-label">ЗАМЕТКИ ИССЛЕДОВАТЕЛЯ:</span><textarea class="form-textarea" id="sfNotes">${record.notes||''}</textarea></div>
      <button class="btn-save" id="saveBtn">💾 СОХРАНИТЬ</button>
      ${index >= 0 ? '<button class="btn-save" id="deleteBtn" style="border-color:#ff4444;color:#ff4444;margin-top:8px;">🗑 УДАЛИТЬ</button>' : ''}
      <button class="btn-save" id="cancelBtn" style="border-color:#440088;color:#8844ff;margin-top:8px;">✕ ОТМЕНА</button>`;
    document.getElementById('saveBtn').addEventListener('click', saveSpecimen);
    document.getElementById('cancelBtn').addEventListener('click', closeForm);
    if (index >= 0) document.getElementById('deleteBtn').addEventListener('click', deleteSpecimen);
    container.scrollIntoView({ behavior: 'smooth' });
  }

  function closeForm() { document.getElementById('formContainer').style.display = 'none'; editingIndex = -1; }

  function saveSpecimen() {
    const record = {
      name: document.getElementById('sfName').value.trim(),
      type: document.getElementById('sfType').value.trim(),
      location: document.getElementById('sfLocation').value.trim(),
      danger: document.getElementById('sfDanger').value.trim(),
      weakness: document.getElementById('sfWeakness').value.trim(),
      description: document.getElementById('sfDescription').value.trim(),
      notes: document.getElementById('sfNotes').value.trim(),
      updated: new Date().toLocaleString('ru-RU')
    };
    if (!record.name) { alert('НАЗВАНИЕ ОБЯЗАТЕЛЬНО!'); return; }
    if (editingIndex >= 0) specimens[editingIndex] = record;
    else specimens.push(record);
    db.ref('specimens').set(specimens);
    closeForm();
    renderSpecimenList();
  }

  function deleteSpecimen() {
    if (confirm('Удалить образец?')) {
      specimens.splice(editingIndex, 1);
      db.ref('specimens').set(specimens);
      closeForm();
      renderSpecimenList();
    }
  }

  document.getElementById('newSpecimenBtn').addEventListener('click', () => openForm(-1));

  loadData();
</script>
</body>
</html>
