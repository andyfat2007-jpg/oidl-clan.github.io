<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>МЕДПУНКТ · О.И.Д.Л.</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #020503; min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Courier New', 'VT323', monospace;
      position: relative; overflow-x: hidden;
      user-select: none; -webkit-user-select: none;
    }

    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg,
          rgba(0,0,0,0.5) 0px, rgba(20,0,0,0.2) 3px,
          rgba(255,0,0,0.02) 4px, transparent 5px);
      pointer-events: none; z-index: 100; animation: scan 10s linear infinite; opacity: 0.7;
    }

    body.desktop { padding: 16px; }
    body.desktop::after {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 30%, rgba(30,0,0,0.25) 100%);
      pointer-events: none; z-index: 99;
    }
    body.mobile { padding: 0; }

    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 20px; } }

    .terminal {
      background-color: #0b0c0e; display: flex; flex-direction: column;
      position: relative; z-index: 20;
    }
    body.desktop .terminal {
      max-width: 1000px; width: 100%; border: 4px solid #660000;
      box-shadow: 0 0 0 2px #330000, 0 0 20px #ff2222 inset, 0 0 30px rgba(255,0,0,0.3);
      border-radius: 12px 12px 20px 20px; padding: 0 0 6px 0;
    }
    body.mobile .terminal { width: 100%; min-height: 100vh; min-height: 100dvh; border: none; }

    .terminal-header {
      background: #0a0000; border-bottom: 2px solid #660000;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
      padding: 12px 18px; border-radius: 8px 8px 0 0;
    }
    body.mobile .terminal-header { border-radius: 0; }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .red-cross {
      position: relative; width: 40px; height: 40px;
    }
    .red-cross::before, .red-cross::after {
      content: ""; position: absolute; background: #ff2222;
      box-shadow: 0 0 15px #ff2222;
    }
    .red-cross::before { width: 100%; height: 12px; top: 14px; left: 0; }
    .red-cross::after { width: 12px; height: 100%; left: 14px; top: 0; }
    body.mobile .red-cross { width: 30px; height: 30px; }
    body.mobile .red-cross::before { height: 9px; top: 11px; }
    body.mobile .red-cross::after { width: 9px; left: 11px; }

    .header-title {
      font-weight: bold; letter-spacing: 5px; color: #ff2222;
      text-shadow: 0 0 10px #ff2222; font-family: 'VT323', monospace;
    }
    body.desktop .header-title { font-size: 1.5rem; }
    body.mobile .header-title { font-size: 1.2rem; }

    .back-btn {
      background: #1a0000; border: 2px solid #ff4444; color: #ff4444;
      font-family: 'Courier New', monospace; font-size: 0.85rem;
      padding: 6px 14px; cursor: pointer; text-decoration: none;
      text-transform: uppercase;
    }
    .back-btn:hover { background: #330000; box-shadow: 0 0 12px #ff4444; }

    .screen {
      color: #ff8888; text-shadow: 0 0 6px rgba(255,100,100,0.5);
      background: #050000; font-size: 0.95rem; line-height: 1.4;
      position: relative; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 20px 18px;
      border-left: 2px solid #330000; border-right: 2px solid #330000;
      box-shadow: inset 0 0 30px #000;
    }
    body.mobile .screen { padding: 14px 10px; }

    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-input {
      flex: 1; background: #0a0000; border: 2px solid #660000; color: #ff8888;
      padding: 12px; font-family: 'Courier New', monospace; font-size: 0.95rem; outline: none;
    }
    .search-btn {
      background: #1a0000; border: 2px solid #ff2222; color: #ff2222;
      padding: 10px 18px; cursor: pointer; font-family: inherit; font-size: 1rem;
    }

    .patient-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .patient-card {
      border: 2px solid #660000; background: #0a0000; padding: 14px;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    }
    .patient-card:hover { border-color: #ff2222; background: #110000; }
    .patient-name { color: #ff4444; font-size: 1.2rem; font-family: 'VT323', monospace; }
    .patient-info { color: #993333; font-size: 0.85rem; }
    .patient-blood { color: #cc3333; font-weight: bold; }

    .btn-new {
      background: #1a0000; border: 2px solid #ff2222; color: #ff2222;
      padding: 14px; font-family: inherit; font-size: 1rem;
      text-transform: uppercase; cursor: pointer; width: 100%; margin-bottom: 16px;
    }

    .medical-form {
      border: 2px solid #ff2222; background: #0a0000; padding: 20px; margin-top: 12px;
    }
    .form-section { margin-bottom: 14px; }
    .form-label { color: #ff6666; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
    .form-input, .form-textarea {
      width: 100%; background: #050000; border: 2px solid #660000;
      color: #ff9999; padding: 10px 12px; font-family: 'Courier New', monospace;
      font-size: 0.95rem; outline: none;
    }
    .form-textarea { resize: vertical; min-height: 60px; }

    .form-row { display: flex; gap: 10px; }
    .form-row .form-section { flex: 1; }
    body.mobile .form-row { flex-direction: column; gap: 0; }

    .form-buttons { display: flex; gap: 8px; margin-top: 18px; }
    .btn-save {
      background: #002200; border: 2px solid #44ff44; color: #44ff44;
      padding: 14px; font-family: inherit; font-size: 1rem; text-transform: uppercase; cursor: pointer; flex: 1;
    }
    .btn-cancel {
      background: #1a0000; border: 2px solid #660000; color: #993333;
      padding: 14px; font-family: inherit; font-size: 1rem; text-transform: uppercase; cursor: pointer; flex: 1;
    }
    .btn-delete {
      background: #220000; border: 2px solid #ff4444; color: #ff4444;
      padding: 14px; font-family: inherit; font-size: 1rem; text-transform: uppercase; cursor: pointer;
    }

    .terminal-footer {
      padding: 10px 14px; display: flex; justify-content: space-between;
      color: #661111; background: #060000; border-top: 1px solid #330000;
      font-size: 0.7rem; text-transform: uppercase; flex-shrink: 0;
      border-radius: 0 0 8px 8px;
    }

    @media (max-width: 600px) {
      .patient-card { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

<div class="terminal">
  <div class="terminal-header">
    <div class="header-left">
      <div class="red-cross"></div>
      <div class="header-title">МЕДПУНКТ</div>
    </div>
    <a href="index.html" class="back-btn">◄ ТЕРМИНАЛ</a>
  </div>

  <div class="screen">
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="ПОИСК ПАЦИЕНТА...">
      <button class="search-btn" id="searchBtn">🔍</button>
    </div>

    <button class="btn-new" id="newCardBtn">■ НОВАЯ МЕДИЦИНСКАЯ КАРТА</button>

    <div class="patient-list" id="patientList"></div>
    <div id="formContainer" style="display:none;"></div>
  </div>

  <div class="terminal-footer"><span>МЕДИЦИНСКИЙ ТЕРМИНАЛ v.1.0</span><span>О.И.Д.Л.</span></div>
</div>

<script>
(function(){
  "use strict";

  const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth < 768;
  document.body.className = isMobile ? 'mobile' : 'desktop';

  firebase.initializeApp({
    apiKey: "AIzaSyCAfEXo57oLviomSjUm4dC23-uHTS11HHU",
    authDomain: "oidl-rule.firebaseapp.com",
    databaseURL: "https://oidl-rule-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "oidl-rule",
    storageBucket: "oidl-rule.firebasestorage.app",
    messagingSenderId: "46225230611",
    appId: "1:46225230611:web:f2017e047a52925420e8e6"
  });
  const db = firebase.database();

  let medicalRecords = [];
  let editingIndex = -1;

  function loadData() {
    db.ref('medicalRecords').on('value', sn => {
      medicalRecords = sn.exists() ? sn.val() : [];
      renderPatientList();
    });
  }

  function renderPatientList(filter = '') {
    const list = document.getElementById('patientList');
    if (!list) return;
    const filtered = filter ? medicalRecords.filter(r => r.name.toLowerCase().includes(filter.toLowerCase())) : medicalRecords;
    if (!filtered.length) {
      list.innerHTML = '<div style="color:#661111;text-align:center;padding:20px;">НЕТ МЕДИЦИНСКИХ КАРТ</div>';
      return;
    }
    list.innerHTML = '';
    filtered.forEach(record => {
      const idx = medicalRecords.indexOf(record);
      const card = document.createElement('div');
      card.className = 'patient-card';
      card.innerHTML = `<div><div class="patient-name">◆ ${record.name}</div><div class="patient-info">${record.age||'?'} лет | ${record.height||'?'} см | ${record.weight||'?'} кг</div></div><div class="patient-blood">🩸 ${record.bloodType||'?'}</div>`;
      card.addEventListener('click', () => openForm(idx));
      list.appendChild(card);
    });
  }

  function openForm(index) {
    editingIndex = index;
    const record = index >= 0 ? medicalRecords[index] : {};
    const container = document.getElementById('formContainer');
    container.style.display = 'block';
    container.innerHTML = `
      <div class="medical-form">
        <div class="form-row">
          <div class="form-section"><span class="form-label">Имя:</span><input type="text" class="form-input" id="mfName" value="${record.name||''}"></div>
          <div class="form-section"><span class="form-label">Возраст:</span><input type="text" class="form-input" id="mfAge" value="${record.age||''}"></div>
        </div>
        <div class="form-row">
          <div class="form-section"><span class="form-label">Рост (см):</span><input type="text" class="form-input" id="mfHeight" value="${record.height||''}"></div>
          <div class="form-section"><span class="form-label">Вес (кг):</span><input type="text" class="form-input" id="mfWeight" value="${record.weight||''}"></div>
        </div>
        <div class="form-section"><span class="form-label">Группа крови, Резус Фактор:</span><input type="text" class="form-input" id="mfBlood" value="${record.bloodType||''}"></div>
        <div class="form-section"><span class="form-label">Хронические заболевания:</span><textarea class="form-textarea" id="mfChronic">${record.chronic||''}</textarea></div>
        <div class="form-section"><span class="form-label">Аллергии:</span><textarea class="form-textarea" id="mfAllergies">${record.allergies||''}</textarea></div>
        <div class="form-section"><span class="form-label">Фобии:</span><textarea class="form-textarea" id="mfPhobias">${record.phobias||''}</textarea></div>
        <div class="form-section"><span class="form-label">Перенесенные заболевания/операции:</span><textarea class="form-textarea" id="mfSurgeries">${record.surgeries||''}</textarea></div>
        <div class="form-buttons">
          <button class="btn-save" id="saveRecordBtn">💾 СОХРАНИТЬ</button>
          <button class="btn-cancel" id="cancelBtn">✕ ОТМЕНА</button>
          ${index >= 0 ? '<button class="btn-delete" id="deleteRecordBtn">🗑 УДАЛИТЬ</button>' : ''}
        </div>
      </div>`;

    document.getElementById('saveRecordBtn').addEventListener('click', saveRecord);
    document.getElementById('cancelBtn').addEventListener('click', closeForm);
    if (index >= 0) document.getElementById('deleteRecordBtn').addEventListener('click', deleteRecord);
    container.scrollIntoView({ behavior: 'smooth' });
  }

  function closeForm() { document.getElementById('formContainer').style.display = 'none'; editingIndex = -1; }

  function saveRecord() {
    const record = {
      name: document.getElementById('mfName').value.trim(),
      age: document.getElementById('mfAge').value.trim(),
      height: document.getElementById('mfHeight').value.trim(),
      weight: document.getElementById('mfWeight').value.trim(),
      bloodType: document.getElementById('mfBlood').value.trim(),
      chronic: document.getElementById('mfChronic').value.trim(),
      allergies: document.getElementById('mfAllergies').value.trim(),
      phobias: document.getElementById('mfPhobias').value.trim(),
      surgeries: document.getElementById('mfSurgeries').value.trim(),
      updated: new Date().toLocaleString('ru-RU')
    };
    if (!record.name) { alert('ИМЯ ОБЯЗАТЕЛЬНО!'); return; }
    if (editingIndex >= 0) medicalRecords[editingIndex] = record;
    else medicalRecords.push(record);
    db.ref('medicalRecords').set(medicalRecords);
    closeForm();
    renderPatientList();
  }

  function deleteRecord() {
    if (confirm('Удалить медицинскую карту?')) {
      medicalRecords.splice(editingIndex, 1);
      db.ref('medicalRecords').set(medicalRecords);
      closeForm();
      renderPatientList();
    }
  }

  document.getElementById('searchBtn').addEventListener('click', () => renderPatientList(document.getElementById('searchInput').value));
  document.getElementById('searchInput').addEventListener('input', function() { renderPatientList(this.value); });
  document.getElementById('newCardBtn').addEventListener('click', () => openForm(-1));

  loadData();
})();
</script>
</body>
</html>
